---
- name: Provision benchmark worker (elbencho + fio + stress-ng)
  hosts: workers
  become: true
  vars:
    elbencho_deb: /tmp/elbencho_amd64.deb

  tasks:
    - name: Wait for cloud-init to finish all boot tasks
      # cloud-init runs package_update, unattended-upgrades and apt
      # operations during first boot. Until it reaches the done state,
      # any apt/dpkg lock taken by ansible races against cloud-init.
      # cloud-init status --wait blocks until cloud-init is finished,
      # which is the only reliable way to avoid the dpkg frontend lock.
      shell: cloud-init status --wait
      changed_when: false
      failed_when: false
      timeout: 600

    - name: Belt and suspenders - wait for any straggling apt/dpkg lock
      shell: |
        for i in $(seq 1 150); do
          if ! fuser /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/lib/apt/lists/lock >/dev/null 2>&1; then
            exit 0
          fi
          sleep 2
        done
        echo "timed out waiting for dpkg/apt locks" >&2
        exit 1
      changed_when: false

    - name: Copy elbencho deb
      copy:
        src: "{{ elbencho_deb_local }}"
        dest: "{{ elbencho_deb }}"
        mode: '0644'

    # The ansible apt module shells out to "dpkg -i" when given deb:, and
    # "apt-get install" when given name:. dpkg directly does not honor
    # the lock_timeout option of the apt module: if another process
    # (typically cloud-inits unattended-upgrades) takes the dpkg frontend
    # lock between our wait task and this task, dpkg fails immediately
    # instead of waiting. We bypass the apt module here and call
    # apt-get install directly with Dpkg::Lock::Timeout=300, which makes
    # apt-get and dpkg cooperatively wait up to 300s for the lock. We
    # also wrap with retries as a final safety net.
    - name: Install elbencho (apt-get with dpkg lock timeout 300s)
      shell: |
        set -e
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          -o Dpkg::Options::=--force-confdef \
          -o Dpkg::Options::=--force-confold \
          -o Dpkg::Lock::Timeout=300 \
          {{ elbencho_deb }}
      register: elb_install
      changed_when: "'Setting up elbencho' in elb_install.stdout"
      retries: 3
      delay: 15
      until: elb_install is succeeded

    - name: Install stress-ng, fio and qemu-guest-agent (apt-get with dpkg lock timeout 300s)
      shell: |
        set -e
        DEBIAN_FRONTEND=noninteractive apt-get update -o Dpkg::Lock::Timeout=300
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          -o Dpkg::Options::=--force-confdef \
          -o Dpkg::Options::=--force-confold \
          -o Dpkg::Lock::Timeout=300 \
          stress-ng fio qemu-guest-agent
      register: pkgs_install
      changed_when: "'newly installed' in pkgs_install.stdout"
      retries: 3
      delay: 15
      until: pkgs_install is succeeded

    - name: Start and enable qemu-guest-agent
      systemd:
        name: qemu-guest-agent
        state: started
        enabled: true

    - name: Create elbencho systemd service
      copy:
        dest: /etc/systemd/system/elbencho.service
        content: |
          [Unit]
          Description=Elbencho Benchmark Agent
          After=network.target
          [Service]
          Type=simple
          ExecStart=/usr/bin/elbencho --service --foreground
          Restart=always
          RestartSec=5
          User=root
          [Install]
          WantedBy=multi-user.target

    - name: Start and enable elbencho service
      systemd:
        name: elbencho
        state: started
        enabled: true
        daemon_reload: true

    - name: Create fio-server systemd service
      copy:
        dest: /etc/systemd/system/fio-server.service
        content: |
          [Unit]
          Description=fio --server (distributed benchmark agent)
          After=network-online.target
          Wants=network-online.target
          [Service]
          Type=simple
          ExecStart=/usr/bin/fio --server
          Restart=on-failure
          RestartSec=5
          User=root
          [Install]
          WantedBy=multi-user.target

    - name: Start and enable fio-server service
      systemd:
        name: fio-server
        state: started
        enabled: true
        daemon_reload: true
